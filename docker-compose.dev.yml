# ============================================
# SEO Tool - Development Docker Compose
# Usage: docker compose -f docker-compose.dev.yml up
# ============================================

version: "3.9"

services:
  seo-tool-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seo-tool-dev
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_URL=sqlite+aiosqlite:///./data/seo_tool.db
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - ./data:/app/data
    command: python -m uvicorn src.api.app:create_app --factory --host 0.0.0.0 --port 8000 --reload
