{% extends "base.html" %}
{% block title %}Crawl - SEO Tool{% endblock %}
{% block page_title %}Site Crawler{% endblock %}

{% block content %}
<div x-data="crawlPage()">
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h3 class="text-lg font-semibold mb-4">Crawl a Website</h3>
        <form @submit.prevent="startCrawl()" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input type="url" x-model="url" placeholder="https://example.com"
                       class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" required>
                <div class="flex gap-3">
                    <input type="number" x-model="maxPages" min="1" max="500" placeholder="Max pages"
                           class="w-full border border-gray-300 rounded-lg px-4 py-2">
                    <input type="number" x-model="maxDepth" min="1" max="10" placeholder="Depth"
                           class="w-full border border-gray-300 rounded-lg px-4 py-2">
                </div>
                <button type="submit" :disabled="loading"
                        class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 disabled:opacity-50">
                    <span x-text="loading ? 'Crawling...' : 'Start Crawl'"></span>
                </button>
            </div>
        </form>
    </div>

    <!-- Crawl Results -->
    <div x-show="result" x-cloak>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-2xl font-bold text-blue-600" x-text="result?.total_pages"></p>
                <p class="text-xs text-gray-500">Pages Crawled</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-2xl font-bold text-red-600" x-text="result?.total_errors"></p>
                <p class="text-xs text-gray-500">Errors</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-2xl font-bold text-green-600" x-text="result?.avg_response_time + 'ms'"></p>
                <p class="text-xs text-gray-500">Avg Response Time</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-2xl font-bold text-purple-600" x-text="result?.crawl_duration_sec + 's'"></p>
                <p class="text-xs text-gray-500">Duration</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="text-left px-4 py-3">URL</th>
                        <th class="px-4 py-3">Status</th>
                        <th class="px-4 py-3">Time</th>
                        <th class="px-4 py-3">Words</th>
                        <th class="px-4 py-3">Links</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="page in result?.pages?.slice(0, 50)" :key="page.url">
                        <tr class="border-t hover:bg-gray-50">
                            <td class="px-4 py-2 truncate max-w-xs" x-text="page.url"></td>
                            <td class="px-4 py-2 text-center">
                                <span class="px-2 py-0.5 rounded text-xs"
                                      :class="page.status_code === 200 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                      x-text="page.status_code || 'ERR'"></span>
                            </td>
                            <td class="px-4 py-2 text-center" x-text="page.response_time_ms + 'ms'"></td>
                            <td class="px-4 py-2 text-center" x-text="page.word_count"></td>
                            <td class="px-4 py-2 text-center" x-text="page.internal_links + '/' + page.external_links"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function crawlPage() {
    return {
        url: '', maxPages: 50, maxDepth: 3, loading: false, result: null,
        async startCrawl() {
            this.loading = true; this.result = null;
            try {
                const res = await fetch('/api/v1/crawl', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: this.url, max_pages: this.maxPages, max_depth: this.maxDepth})
                });
                const json = await res.json();
                if (json.success) this.result = json.data;
                else alert('Crawl failed');
            } catch(e) { alert('Error: ' + e.message); }
            this.loading = false;
        }
    }
}
</script>
{% endblock %}
