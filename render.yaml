# ===========================================
# Render Blueprint - SEO Tool
# Auto-deploy from GitHub
# ===========================================

services:
  - type: web
    name: seo-tool
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.app:create_app --factory --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
    healthCheckPath: /
    autoDeploy: true
    plan: free
